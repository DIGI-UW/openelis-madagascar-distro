# Validation overlay — self-contained mock + demo Playwright runner.
# Published images only; no upstream source checkout required at runtime.
#
# Bring up stack + mock:
#   docker compose -f compose.yaml -f compose.validate.yaml up -d
#
# Run demo tests (10 Madagascar flows):
#   docker compose -f compose.yaml -f compose.validate.yaml run --rm demo-tests
#
# Readiness:
#   docker compose -f compose.yaml -f compose.validate.yaml ps
#   curl -k -sSf https://localhost:8442/actuator/health
#   curl -sSf http://localhost:8085/health

services:
  analyzer-mock:
    image: itechuw/astm-mock-server:local
    build:
      context: ${OE_REPO:-../OpenELIS-Global-2}/tools/analyzer-mock-server
    platform: linux/amd64
    container_name: openelis-analyzer-mock
    ports:
      - "5050:9600"
      - "8085:8080"
      - "5380:5380"
      - "6001:6001"
      - "6002:6002"
    volumes:
      - analyzer-imports:/data/analyzer-imports
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ASTM_PORT_TEMPLATES: '{"9600":"genexpert_astm","5380":"mindray_bc5380","6001":"mindray_bs200","6002":"mindray_bs300"}'
      RESPONSE_DELAY_MS: "0"
      BRIDGE_CONTAINER_NAME: openelis-analyzer-bridge
      MOCK_CONTAINER_NAME: openelis-analyzer-mock
    command:
      - python
      - -u
      - server.py
      - --port
      - "9600"
      - --simulate-api-port
      - "8080"
      - --verbose
    networks:
      - openelis-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Bridge image defaults to non-root (astm). Mock drops FILE fixtures as root under
  # root-owned 755 dirs; without matching write access the watcher cannot create .failed
  # sidecars or archive — AccessDeniedException spam and FILE E2E flakes.
  openelis-analyzer-bridge:
    user: "0:0"
    ports:
      - "2575:2575"
    environment:
      LOGGING_LEVEL_ORG_ITECH: INFO
      ORG_ITECH_AHB_LISTEN_ASTM_SERVER_PORT: "12001"
      ORG_ITECH_AHB_FORWARD_ASTM_SERVER_HOST_NAME: analyzer-mock
      ORG_ITECH_AHB_FORWARD_ASTM_SERVER_PORT: "9600"
      ORG_ITECH_AHB_MLLP_ENABLED: "true"
      ORG_ITECH_AHB_MLLP_PORT: "2575"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -k -s -f https://localhost:8443/actuator/health > /dev/null",
        ]
      interval: 15s
      # /actuator/health can block ~30s when httpforward checks OE during webapp warmup.
      timeout: 45s
      retries: 5
      start_period: 60s

  demo-tests:
    profiles:
      - demo
    build:
      context: tests/playwright
      dockerfile: Dockerfile
    image: madagascar-demo-tests:local
    # Must match tests/playwright/Dockerfile WORKDIR (files live under /app).
    working_dir: /app
    environment:
      # Same as upstream CI: block SW registration (self-signed proxy certs).
      CI: "true"
      BASE_URL: ${BASE_URL:-https://proxy}
      TEST_USER: ${TEST_USER:-admin}
      TEST_PASS: ${TEST_PASS:-adminADMIN!}
      SIMULATOR_URL: ${SIMULATOR_URL:-http://analyzer-mock:8080}
      DB_CONTAINER: ${DB_CONTAINER:-openelisglobal-database}
    command:
      [
        "npx",
        "playwright",
        "test",
        "--project=harness-demo",
        "--config=playwright.config.ts",
        "--workers=1",
      ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Playwright outputDir + html reporter resolve to /app/test-results
      # (config: path.resolve(__dirname, "test-results/test-output")).
      # Mount there so video/trace/report land on the host.
      - ./test-results:/app/test-results
      # Host filesystem for real analyzer file drops — read-only, matches
      # the same env-var-driven bind mount on webapp + bridge from Phase 1
      # (compose.yaml). On UAT: ANALYZER_HOST_MOUNT=/mnt
      # (default). On dev: export ANALYZER_HOST_MOUNT=/home/you/OpenELIS-Global-2/docs/debug-local/mnt-snapshot
      # Playwright tests read from ${ANALYZER_HOST_MOUNT:-/mnt}/la2m/central/analyzers_results/...
      # for the drop-real-analyzer-file helper (plan mellow-honking-cascade §2.5c/§2.5d).
      - ${ANALYZER_HOST_MOUNT:-/mnt}:${ANALYZER_HOST_MOUNT:-/mnt}:ro
    networks:
      - openelis-network
    depends_on:
      # Full UI stack (BASE_URL=https://proxy); `compose run` must not start only mock+bridge.
      oe.openelis.org:
        condition: service_started
      proxy:
        condition: service_started
      frontend.openelis.org:
        condition: service_started
      analyzer-mock:
        condition: service_healthy
      openelis-analyzer-bridge:
        condition: service_healthy
