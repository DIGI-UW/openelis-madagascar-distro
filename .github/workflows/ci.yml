name: Update Image Tags
on:
  release:
    types: [published] 
    
jobs:
  update-docker-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract release tag
        id: release_tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG_NAME}"

      - name: Update compose.yaml to use release tags
        run: |
          RELEASE_TAG="${{ steps.release_tag.outputs.TAG_NAME }}"
          # Update all :develop tags to the release tag
          sed -i.bak "s/:develop/:${RELEASE_TAG}/g" compose.yaml
          rm compose.yaml.bak
          echo "Updated compose.yaml with release tag: ${RELEASE_TAG}"
          # Show the changes
          git diff compose.yaml || true

      - name: Commit and update release tag
        run: |
          RELEASE_TAG="${{ steps.release_tag.outputs.TAG_NAME }}"
          
          git add compose.yaml
          if ! git diff --staged --quiet; then
            # Create a new commit with updated compose.yaml
            git commit -m "chore: update image tags to ${RELEASE_TAG} for release"
            
            # Update the tag to point to the new commit
            git tag -f ${RELEASE_TAG}
            git push origin ${RELEASE_TAG} --force
            echo "Updated release tag ${RELEASE_TAG} with compose.yaml changes"
          else
            echo "No changes to commit (compose.yaml already has release tags)"
          fi


