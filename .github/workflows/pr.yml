name: PR checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose syntax + path resolution
        run: |
          docker compose -f compose.yaml config > /dev/null
          docker compose -f compose.yaml -f compose.letsencrypt.yaml config > /dev/null
