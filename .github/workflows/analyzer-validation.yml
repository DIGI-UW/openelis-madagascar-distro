name: Analyzer Validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  analyzer-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start validation stack
        run: docker compose -f compose.yaml -f compose.validate.yaml up -d

      - name: Wait for core services
        run: |
          set -euo pipefail
          max_attempts=60
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            healthy_count="$(docker compose -f compose.yaml -f compose.validate.yaml ps --format json | jq -r 'select(.Health == "healthy") | .Service' | wc -l)"
            if [ "$healthy_count" -ge 3 ]; then
              echo "Core services are healthy"
              exit 0
            fi
            echo "Waiting for services to become healthy ($attempt/$max_attempts)"
            sleep 5
            attempt=$((attempt + 1))
          done
          echo "Timed out waiting for healthy services"
          docker compose -f compose.yaml -f compose.validate.yaml ps
          exit 1

      - name: API contract smoke tests
        id: api_contract
        run: |
          set -euo pipefail
          COMPOSE_PROFILES=demo docker compose -f compose.yaml -f compose.validate.yaml run --rm demo-tests \
            npx playwright test \
            --project=harness-foundational \
            --config=playwright.config.ts \
            --workers=1

      - name: Run focused analyzer subset
        id: run_subset
        if: steps.api_contract.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          # Image WORKDIR is /app (see tests/playwright/Dockerfile); do not use npm --prefix tests/playwright.
          COMPOSE_PROFILES=demo docker compose -f compose.yaml -f compose.validate.yaml run --rm demo-tests \
            npx playwright test \
            --project=harness-demo \
            --config=playwright.config.ts \
            --workers=1 \
            --grep 'GeneXpert ASTM|Mindray BC-5380|QuantStudio 7|Thermo Multiskan FC'

      - name: Record analyzer subset outcome
        if: always()
        run: |
          if [ "${{ steps.run_subset.outcome }}" != "success" ]; then
            echo "Analyzer subset reported failures; logs and artifacts have been uploaded for triage."
          fi

      - name: Collect service logs
        if: always()
        run: |
          mkdir -p test-artifacts
          docker compose -f compose.yaml -f compose.validate.yaml logs openelisglobal-webapp > test-artifacts/openelisglobal-webapp.log || true
          docker compose -f compose.yaml -f compose.validate.yaml logs openelis-analyzer-bridge > test-artifacts/openelis-analyzer-bridge.log || true
          docker compose -f compose.yaml -f compose.validate.yaml logs analyzer-mock > test-artifacts/analyzer-mock.log || true
          docker compose -f compose.yaml -f compose.validate.yaml ps > test-artifacts/compose-ps.txt || true

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-validation-artifacts
          path: |
            test-results
            test-artifacts
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: docker compose -f compose.yaml -f compose.validate.yaml down -v
