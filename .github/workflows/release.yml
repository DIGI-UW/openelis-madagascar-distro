name: Release tarball

on:
  push:
    branches: [main]
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  tarball:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for `git describe` and `git archive`

      - name: Build tarball
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          ./scripts/build-tarball.sh
          echo "TARBALL=openelis-madagascar-distro-${REF_NAME//\//-}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload workflow artifact (main pushes)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARBALL }}
          path: ${{ env.TARBALL }}
          retention-days: 90

      - name: Attach to GitHub Release (tag pushes)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
