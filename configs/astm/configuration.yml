# OpenELIS Analyzer Bridge Configuration
# Reference: https://github.com/DIGI-UW/openelis-analyzer-bridge
# Feature: 011-madagascar-analyzer-integration

org:
  itech:
    ahb:
      # forward-astm-server:
      #   hostName: astm-http-bridge2
      #   port: 12001
      forward-http-server:
        # HttpForwardingRouter appends /astm, /hl7, /csv (CI harness pattern)
        uri: https://openelisglobal-webapp:8443/OpenELIS-Global/analyzer
        username: admin
        password: adminADMIN!
        healthUri: https://openelisglobal-webapp:8443/OpenELIS-Global/health
        healthMethod: GET
management:
  health:
    httpforward:
      enabled: true

openelis:
  url: https://openelisglobal-webapp:8443/OpenELIS-Global/analyzer
  timeout: 30000
  ssl:
    verify: false  # Development only - uses self-signed certs

astm:
  # Must match container listen port (bridge listens on 12001 in published image)
  port: 12001
  bind: 0.0.0.0
  timeout: 30000

logging:
  level: DEBUG

# =============================================================================
# Analyzer-Specific RS232 Serial Configuration Reference
# =============================================================================
# Note: RS232 serial port configuration is stored in the OpenELIS database
# (serial_port_configuration table) and managed through the Analyzer Dashboard.
# The settings below serve as documentation for supported analyzers.
#
# For serial-to-TCP converters (e.g., Moxa, Lantronix), configure the converter
# to match these RS232 parameters, then configure this bridge for TCP.
# =============================================================================

# Mindray BA-88A Semi-automatic Biochemistry Analyzer
# Protocol: ASTM LIS2-A2 over RS232
# Milestone: M6
# mindray-ba88a:
#   serial:
#     port: /dev/ttyUSB0       # Linux serial port (or COM1 on Windows)
#     baud_rate: 9600          # Standard baud rate for BA-88A
#     data_bits: 8             # 8 data bits
#     stop_bits: 1             # 1 stop bit
#     parity: NONE             # No parity
#     flow_control: NONE       # No hardware/software flow control
#   tests:
#     - ALT                    # Alanine Aminotransferase
#     - AST                    # Aspartate Aminotransferase
#     - ALP                    # Alkaline Phosphatase
#     - T-Bil                  # Total Bilirubin
#     - D-Bil                  # Direct Bilirubin
#     - TC                     # Total Cholesterol
#     - TG                     # Triglycerides
#     - HDL-C                  # HDL Cholesterol
#     - CREA                   # Creatinine
#     - TP                     # Total Protein





