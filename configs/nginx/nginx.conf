worker_processes 1;

events { worker_connections 1024; }
http {
    # Catch-all HTTP-01 challenge server so hostname additions stay compose-driven.
    server {
        listen [::]:80;
        listen 80;
        server_name _;

        # ^~ ensures this wins over location / (nginx 1.15 prefix matching)
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen [::]:443 ssl;
        listen 443 ssl default_server;
        # Host routing is generic here; certificate SANs are driven by compose env vars.
        server_name _ localhost;

        ssl_certificate /etc/nginx/certs/apache-selfsigned.crt;
        ssl_certificate_key /etc/nginx/keys/apache-selfsigned.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

       absolute_redirect off;

        location / {
            proxy_pass http://frontend.openelis.org;
            proxy_redirect     off;
        }

        location /api/ {
            proxy_pass         https://oe.openelis.org:8443/api/;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }
    }

    # Analyzer mock simulator API (mock.mgtest.openelis-global.org)
    server {
        listen [::]:443 ssl;
        listen 443 ssl;
        server_name mock.mgtest.openelis-global.org;

        ssl_certificate /etc/nginx/certs/apache-selfsigned.crt;
        ssl_certificate_key /etc/nginx/keys/apache-selfsigned.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        location / {
            proxy_pass http://openelis-analyzer-mock:8080;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
